name: Build APK

on:
  workflow_dispatch:
    inputs:
      apk_name:
        description: 'Nama file APK output'
        required: true
        default: 'GeneticV3'
      telegram_bot:
        description: 'Telegram Bot Token (opsional)'
        required: false
      telegram_chat:
        description: 'Telegram Chat ID (opsional)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Inject config
      run: |
        if [ -n "${{ github.event.inputs.telegram_bot }}" ]; then
          echo "telegramBot=${{ github.event.inputs.telegram_bot }}" >> gradle.properties
        fi
        if [ -n "${{ github.event.inputs.telegram_chat }}" ]; then
          echo "telegramChat=${{ github.event.inputs.telegram_chat }}" >> gradle.properties
        fi
        
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.apk_name }}
        path: app/build/outputs/apk/release/*.apk
