name: Build APK

on:
  workflow_dispatch:
    inputs:
      apk_name:
        description: 'Nama file APK'
        required: true
        default: 'GeneticV3'
      telegram_bot:
        description: 'Telegram Bot Token'
        required: false
      telegram_chat:
        description: 'Telegram Chat ID'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Generate Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        curl -L https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        curl -L https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
        curl -L https://github.com/gradle/gradle/raw/v8.2.0/gradlew -o gradlew
        curl -L https://github.com/gradle/gradle/raw/v8.2.0/gradlew.bat -o gradlew.bat
        chmod +x gradlew
        
    - name: Inject Config
      run: |
        if [ -n "${{ github.event.inputs.telegram_bot }}" ]; then
          echo "telegramBot=${{ github.event.inputs.telegram_bot }}" >> gradle.properties
        fi
        if [ -n "${{ github.event.inputs.telegram_chat }}" ]; then
          echo "telegramChat=${{ github.event.inputs.telegram_chat }}" >> gradle.properties
        fi
        
    - name: Build APK
      run: |
        ./gradlew assembleRelease --no-daemon
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.apk_name }}
        path: app/build/outputs/apk/release/*.apk
